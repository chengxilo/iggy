name: Post Dependabot

on:
    pull_request_target:
        paths:
            - "foreign/go/go.mod"
            - "foreign/go/go.sum"
            - "bdd/go/go.mod"
            - "bdd/go/go.sum"
            - "examples/go/go.mod"
            - "examples/go/go.sum"

permissions:
    contents: write

jobs:
    # Auto-runs go mod tidy on Dependabot Go PRs so the tidy check in
    # pre-merge doesn't fail due to cross-module go.sum drift caused by
    # the replace directive in bdd/go/go.mod pointing at foreign/go.
    tidy:
        # Only run for Dependabot PRs
        if: github.actor == 'dependabot[bot]'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.3
              with:
                  ref: ${{ github.event.pull_request.head.ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: actions/setup-go@v6
              with:
                  go-version-file: foreign/go/go.mod

            - name: Run go mod tidy in all Go modules
              run: |
                  for dir in foreign/go bdd/go examples/go; do
                    (cd "$dir" && go mod tidy)
                  done

            - name: Commit and push if changed
              run: |
                  if git diff --exit-code; then
                    echo "No changes from go mod tidy."
                    exit 0
                  fi

                  git config user.name 'github-actions[bot]'
                  git config user.email 'github-actions[bot]@users.noreply.github.com'

                  git add foreign/go/go.mod foreign/go/go.sum \
                          bdd/go/go.mod bdd/go/go.sum \
                          examples/go/go.mod examples/go/go.sum

                  git commit -m "chore(go): run go mod tidy after dependabot bump"
                  git push
